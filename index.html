<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Land Acquisition - Satellite Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Executive Pop-up Card Styling */
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            padding: 0;
            overflow: hidden;
        }
        .leaflet-popup-content { margin: 0; width: 280px !important; }
        
        .card-header {
            background: #004b87;
            color: white;
            padding: 12px 15px;
            font-size: 16px;
            font-weight: bold;
            margin: 0;
        }
        .card-body { padding: 15px; }
        .card-body p { margin: 0 0 15px 0; font-size: 14px; color: #333; line-height: 1.5; }
        
        .action-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            color: #004b87;
            background: #e6f0fa;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #cce0f5;
            transition: all 0.2s ease;
        }
        .action-btn:hover { background: #004b87; color: white; }

        /* Icon 1: Radar Pulse Animation (Unread/New Location) */
        .pulse-icon {
            width: 24px;
            height: 24px;
            background: #e74c3c;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7);
            animation: radarPulse 1.5s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        @keyframes radarPulse {
            to { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
        }

        /* Icon 2: Static Marker (Read/Viewed Location) */
        .viewed-icon {
            width: 16px;
            height: 16px;
            background: #3498db; /* Subtle Corporate Blue */
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // --- 1. CONFIGURATION ---
        // Paste your Google Sheet CSV Link here
        const baseCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQCxk9edXHGuks_P3HqtxddGMRqRfIfeQ60awqLgjmfZhgRR4okFRih2JCYdaR82SW8quFdqLUyeJYO/pub?gid=0&single=true&output=csv';
        
        // Cache-Buster ensures live data
        const csvUrl = baseCsvUrl + '&v=' + new Date().getTime();

        // --- 2. MAP INITIALIZATION ---
        const map = L.map('map').setView([6.9271, 79.8612], 8);

        // High-Resolution Satellite Basemap (Esri World Imagery)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
            maxZoom: 19
        }).addTo(map);

        // Define the two visual states for the markers
        const unreadAnimatedMarker = L.divIcon({
            className: 'custom-div-icon',
            html: "<div class='pulse-icon'></div>",
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });

        const readStaticMarker = L.divIcon({
            className: 'custom-div-icon',
            html: "<div class='viewed-icon'></div>",
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        // --- 3. DATA PROCESSING ---
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            // Clean the data: trims invisible spaces and normalizes case
            transformHeader: function(header) {
                return header.trim();
            },
            complete: function(results) {
                const data = results.data;
                
                data.forEach(row => {
                    if (row.Latitude && row.Longitude) {
                        const lat = parseFloat(row.Latitude);
                        const lng = parseFloat(row.Longitude);

                        if (!isNaN(lat) && !isNaN(lng)) {
                            
                            // Safety fallback for the Description column
                            // This checks for "Description" or "description"
                            const parcelDescription = row.Description || row.description || 'No detailed metrics provided for this parcel.';
                            const parcelName = row.Name || row.name || 'Strategic Plot';
                            const parcelLink = row.Link || row.link || '';

                            // Construct the Executive Card UI
                            const cardContent = `
                                <div class="card-header">${parcelName}</div>
                                <div class="card-body">
                                    <p>${parcelDescription}</p>
                                    ${parcelLink ? `<a href="${parcelLink}" target="_blank" class="action-btn">View Source Details</a>` : ''}
                                </div>
                            `;

                            // Plot the point starting with the Unread (Pulse) icon
                            const marker = L.marker([lat, lng], { icon: unreadAnimatedMarker })
                                .addTo(map)
                                .bindPopup(cardContent);

                            // INTERACTIVE LOGIC: When clicked, change the icon to the static 'Read' state
                            marker.on('click', function() {
                                this.setIcon(readStaticMarker);
                            });
                        }
                    }
                });
            },
            error: function(err) {
                console.error("Data Sync Failed:", err);
                alert("Failed to load market data. Please check the console.");
            }
        });
    </script>

</body>
</html>
