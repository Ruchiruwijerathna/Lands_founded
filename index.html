<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Live Location Map</title>
    
    <!-- PapaParse Library to read Google Sheets CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Leaflet CSS for Map Styling -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS for Map Functionality -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        /* Card Styling for the Popup */
        .map-card { padding: 5px; max-width: 250px; }
        .map-card h3 { margin: 0 0 8px 0; color: #1a73e8; font-size: 16px; }
        .map-card p { margin: 0 0 12px 0; font-size: 13px; color: #444; line-height: 1.4; }
        .map-card a { text-decoration: none; color: white; background: #1a73e8; padding: 6px 12px; border-radius: 4px; font-size: 12px; display: inline-block; }
        .map-card a:hover { background: #1557b0; }
    </style>
</head>
<body>

    <!-- The map container -->
    <div id="map"></div>

    <script>
        // 1. Define your Google Sheets CSV link here
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQCxk9edXHGuks_P3HqtxddGMRqRfIfeQ60awqLgjmfZhgRR4okFRih2JCYdaR82SW8quFdqLUyeJYO/pub?gid=0&single=true&output=csv';

        // 2. Initialize the Leaflet Map
        // Set the default center (Colombo, Sri Lanka coordinates: 6.9271, 79.8612) and zoom level
        const map = L.map('map').setView([6.9271, 79.8612], 8);

        // 3. Load the free OpenStreetMap base layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 4. Fetch live data from Google Sheets and plot markers
        Papa.parse(csvUrl, {
            download: true,
            header: true, // Uses the first row of the sheet as keys
            complete: function(results) {
                const data = results.data;
                
                data.forEach(row => {
                    // Ensure row has required Latitude and Longitude data
                    if (row.Latitude && row.Longitude) {
                        const lat = parseFloat(row.Latitude);
                        const lng = parseFloat(row.Longitude);

                        // Create the HTML format for the Popup Card
                        const cardContent = `
                            <div class="map-card">
                                <h3>${row.Name || 'Unknown Location'}</h3>
                                <p>${row.Description || 'No description provided.'}</p>
                                ${row.Link ? `<a href="${row.Link}" target="_blank">View Original Link</a>` : ''}
                            </div>
                        `;

                        // Add the marker to the map and attach the popup card
                        L.marker([lat, lng])
                            .addTo(map)
                            .bindPopup(cardContent);
                    }
                });
            }
        });
    </script>

</body>
</html>
